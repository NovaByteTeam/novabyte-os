name: 🚀 OS Update Release

# Triggered manually from GitHub Actions tab.
# Creates a GitHub Release — the update server's /check endpoint
# picks it up automatically. No server secrets needed.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New OS version (e.g. 3.1.0)'
        required: true
        type: string
      changelog:
        description: 'Changelog (use \n for line breaks)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

jobs:
  release:
    name: Create OS GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create tags + releases

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # ── 2. Create and push the git tag ────────────────────────────────────
      - name: Create git tag
        run: |
          git config user.name  "NovaByte Release Bot"
          git config user.email "bot@novabyte.os"
          git tag -a "v${{ inputs.version }}" \
              -m "NovaByte OS v${{ inputs.version }}"$'\n\n'"${{ inputs.changelog }}"
          git push origin "v${{ inputs.version }}"

      # ── 3. Create the GitHub Release ──────────────────────────────────────
      #       /api/updates/check filters: stable = non-prerelease, beta = prerelease
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.channel }}" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Convert literal \n in changelog input to real newlines
          CHANGELOG=$(printf '%b' "${{ inputs.changelog }}")

          gh release create "v${{ inputs.version }}" \
            --title "NovaByte OS v${{ inputs.version }}" \
            --notes "$CHANGELOG" \
            $PRERELEASE_FLAG
