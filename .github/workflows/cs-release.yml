name: 🛡️ Core Services Update Release

# Triggered manually from GitHub Actions tab.
# Builds a CS package from cs-manifest.json, creates a GitHub Release
# on the PUBLIC novabyte-cs repo so any fork/clone can pull it without a token.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'CS version (e.g. 2026.05.2)'
        required: true
        type: string
      changelog:
        description: 'Changelog (use \n for line breaks)'
        required: true
        type: string
      from_tag:
        description: 'CS tag to diff from (leave blank = auto-detect latest cs- tag)'
        required: false
        type: string
      channel:
        description: 'Release channel'
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

# ─── CONFIGURE THIS ───────────────────────────────────────────────────────────
# Set CS_PUBLIC_REPO to your public releases repo (owner/repo)
env:
  CS_PUBLIC_REPO: NovaByteOfficial/novabyte-cs   # ← change this
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  release:
    name: Build & publish Core Services update
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create tags in THIS (private) repo

    steps:
      # ── 1. Checkout with full history ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # ── 2. Node setup ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v3/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: v3

      # ── 3. Build the CS package JSON ──────────────────────────────────────
      - name: Build CS package
        run: |
          node updates/cs-packager.js \
            --version   "${{ inputs.version }}" \
            --changelog "${{ inputs.changelog }}" \
            --from      "${{ inputs.from_tag }}" \
            --channel   "${{ inputs.channel }}" \
            --out       /tmp/cs-package.json
        working-directory: v3

      # ── 4. Tag this commit in the PRIVATE repo (used for future diffs) ────
      - name: Create CS git tag
        run: |
          git config user.name  "NovaByte Release Bot"
          git config user.email "bot@novabyte.os"
          git tag -a "cs-v${{ inputs.version }}" \
              -m "Nova Core Services v${{ inputs.version }}"$'\n\n'"${{ inputs.changelog }}"
          git push origin "cs-v${{ inputs.version }}"

      # ── 5. Publish release to the PUBLIC repo ─────────────────────────────
      #       CS_RELEASES_TOKEN must have Contents: write on the public repo.
      #       Add it in: private repo Settings → Secrets → Actions → New secret
      - name: Publish to public CS releases repo
        env:
          GH_TOKEN: ${{ secrets.CS_RELEASES_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.channel }}" = "beta" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          CHANGELOG=$(printf '%b' "${{ inputs.changelog }}")

          gh release create "cs-v${{ inputs.version }}" \
            --repo "${{ env.CS_PUBLIC_REPO }}" \
            --title "Nova Core Services v${{ inputs.version }}" \
            --notes "$CHANGELOG" \
            $PRERELEASE_FLAG \
            /tmp/cs-package.json#cs-package.json
