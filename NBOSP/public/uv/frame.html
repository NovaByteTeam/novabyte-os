<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #07090f; }

  #uv-status {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    font-family: 'Inter', system-ui, sans-serif;
    color: #8b949e;
    font-size: 13px;
  }

  .uv-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(99,102,241,0.2);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .uv-error {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: #f87171;
    text-align: center;
    padding: 0 32px;
  }
  .uv-error-title { font-size: 15px; font-weight: 600; color: #e6edf3; }
  .uv-error-body  { font-size: 12px; color: #8b949e; max-width: 340px; }
</style>
</head>
<body>
<div id="uv-status">
  <div class="uv-spinner" id="spinner"></div>
  <span id="status-text">Connecting to proxy…</span>
  <div class="uv-error" id="error-box">
    <span class="uv-error-title" id="error-title">Failed to load</span>
    <span class="uv-error-body"  id="error-body"></span>
  </div>
</div>

<script src="/uv/uv.bundle.js"></script>
<script src="/uv/uv.config.js"></script>
<script>
(async () => {
  const statusEl = document.getElementById('status-text');
  const spinnerEl = document.getElementById('spinner');
  const errorBox  = document.getElementById('error-box');
  const errorTitle = document.getElementById('error-title');
  const errorBody  = document.getElementById('error-body');

  function showError(title, body) {
    spinnerEl.style.display = 'none';
    statusEl.style.display  = 'none';
    errorBox.style.display  = 'flex';
    errorTitle.textContent  = title;
    errorBody.textContent   = body;
    // Notify parent Horizon window
    try { window.parent.postMessage({ type: 'uv-error', title, body }, '*'); } catch {}
  }

  // Pull the target URL from the hash or query param
  let targetUrl = '';
  try {
    const hash = location.hash.slice(1);
    if (hash) targetUrl = decodeURIComponent(hash);
    else {
      const p = new URLSearchParams(location.search);
      targetUrl = p.get('url') || '';
    }
  } catch { targetUrl = location.hash.slice(1); }

  if (!targetUrl) {
    showError('No URL provided', 'Horizon did not pass a target URL to the proxy frame.');
    return;
  }

  // Ensure protocol
  if (!/^https?:\/\//i.test(targetUrl)) targetUrl = 'https://' + targetUrl;

  statusEl.textContent = 'Registering service worker…';

  // Service workers cannot be registered inside cross-origin iframes,
  // but since this page is served from the same origin (/uv/frame.html)
  // registration works normally.
  if (!('serviceWorker' in navigator)) {
    showError(
      'Service workers not supported',
      'Your browser does not support service workers. Try Chrome or Edge.'
    );
    return;
  }

  try {
    // Register the UV service worker scoped to /uv/
    const reg = await navigator.serviceWorker.register('/uv/uv.sw.js', {
      scope: '/uv/',
      updateViaCache: 'none',
    });

    // Wait for the SW to become active (handles first-install case)
    if (reg.installing || reg.waiting) {
      statusEl.textContent = 'Installing proxy engine…';
      await new Promise(resolve => {
        const sw = reg.installing || reg.waiting;
        sw.addEventListener('statechange', function handler() {
          if (this.state === 'activated') { resolve(); this.removeEventListener('statechange', handler); }
        });
        // Also resolve if already controlled
        if (navigator.serviceWorker.controller) resolve();
      });
    }

    statusEl.textContent = 'Navigating…';

    // Encode the URL and navigate — the SW will intercept from here
    const encoded = __uv$config.encodeUrl(targetUrl);
    location.replace(__uv$config.prefix + encoded);

  } catch (err) {
    console.error('[UV Frame]', err);
    showError(
      'Proxy setup failed',
      err.message || 'Could not register the service worker. Check the console for details.'
    );
  }
})();
</script>
</body>
</html>
